    <form class="controls" method="get" action="3d-pipeline.html">
        <div class="control-group">
            <label>Gas Type</label>
            <select name="gas_type">

                <option value="Ne" >Neon</option>
                <option value="Xe" >Xenon</option>
                <option value="Kr" >Krypton</option>

        </div>
        <div class="control-group">
            <label>Pressure (mbar)</label>
            <input type="number" name="pressure_mbar" value="30.0" step="5" min="1" max="200">

        <div class="control-group">
            <label>Intensity (W/cm&sup2;)</label>
            <input type="number" name="intensity_w_cm2" value="1e+14" step="1e13" min="1e13" max="1e16">
        </div>
        <div class="control-group">
            <label>Mirrors</label>
            <select name="n_mirrors">
                <option value="1" >1</option>
                <option value="2" selected>2</option>
                <option value="3" >3</option>
            </select>
        </div>
        <div class="control-group">
            <label>Filter</label>
            <select name="filter_material">
                <option value="Al" selected>Aluminum</option>
                <option value="Zr" >Zirconium</option>
            </select>
        </div>
        <div class="control-group">
            <label>Filter (nm)</label>
            <input type="number" name="filter_thickness_nm" value="200.0" step="50" min="50" max="500">
        </div>
        <button type="submit">Update Pipeline</button>
    </form>
